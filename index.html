<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Taxi V6</title>

<script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>

<style>
body {
  font-family: Arial;
  padding: 15px;
  background: #0f1115;
  color: white;
}

h2 { text-align: center; }

button {
  width: 100%;
  margin: 6px 0;
  padding: 12px;
  border: none;
  border-radius: 10px;
  background: #2d6cff;
  color: white;
  font-weight: bold;
}

button:active { transform: scale(0.98); }

input {
  width: 100%;
  padding: 12px;
  margin: 5px 0;
  border-radius: 8px;
  border: 1px solid #333;
  background: #161a22;
  color: white;
}

.card {
  background: #161a22;
  padding: 12px;
  margin: 10px 0;
  border-radius: 12px;
  border: 1px solid #222;
}

.hidden { display:none; }

hr {
  border: 0;
  border-top: 1px solid #222;
  margin: 15px 0;
}

.topbar {
  display:flex;
  gap:10px;
}

.smallBtn {
  background:#444;
  width: 30%;
}
</style>
</head>

<body>

<h2>🚖 Taxi V6</h2>

<div id="roleSelect">
  <button onclick="setRole('passenger')">🚶 Пассажир</button>
  <button onclick="setRole('driver')">🚗 Водитель</button>
</div>

<div class="topbar hidden" id="topbar">
  <button class="smallBtn" onclick="back()">⬅ Назад</button>
</div>

<div id="passengerUI" class="hidden">
  <h3>Заказ</h3>
  <input id="from" placeholder="Откуда">
  <input id="to" placeholder="Куда">
  <button onclick="createOrder()">🚕 Создать заказ</button>
</div>

<div id="driverUI" class="hidden">
  <h3>Водитель</h3>
  <input id="callsign" placeholder="Позывной">
  <button onclick="saveDriver()">Стать онлайн 🟢</button>
</div>

<hr>

<div id="orders"></div>

<script type="module" src="app.js"></script>

<script>
vkBridge.send("VKWebAppInit");

// базовое уведомление (fallback)
window.nativeNotify = function(title, msg){
  vkBridge.send("VKWebAppShowNotification", {
    title,
    message: msg
  });
};

// кнопка назад
function back() {
  document.getElementById("roleSelect").classList.remove("hidden");
  document.getElementById("passengerUI").classList.add("hidden");
  document.getElementById("driverUI").classList.add("hidden");
  document.getElementById("topbar").classList.add("hidden");

  window.currentRole = null;
}

// выбор роли
window.setRole = function(r){
  window.currentRole = r;

  document.getElementById("roleSelect").classList.add("hidden");
  document.getElementById("topbar").classList.remove("hidden");

  if (r === "passenger") {
    document.getElementById("passengerUI").classList.remove("hidden");
    nativeNotify("Taxi V6", "Вы пассажир 🚶");
  } else {
    document.getElementById("driverUI").classList.remove("hidden");
    nativeNotify("Taxi V6", "Вы водитель 🚗");
  }
};
</script>

</body>
</html>
